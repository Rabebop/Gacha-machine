<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Gacha Gacha!</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@400;600;700&family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet">
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface": "#fff8f6",
                        "on-secondary-fixed": "#2d141c",
                        "primary-fixed": "#ffdad2",
                        "background": "#fff8f6",
                        "outline": "#85736f",
                        "on-primary": "#ffffff",
                        "on-secondary": "#ffffff",
                        "on-tertiary-fixed-variant": "#643f00",
                        "secondary-container": "#ffd1dc",
                        "secondary-fixed-dim": "#e7bbc6",
                        "primary-container": "#f4a492",
                        "on-background": "#281714",
                        "on-error": "#ffffff",
                        "tertiary-fixed": "#ffddb6",
                        "on-primary-container": "#72382b",
                        "outline-variant": "#d8c2bd",
                        "tertiary": "#845400",
                        "on-error-container": "#93000a",
                        "surface-container": "#ffe9e5",
                        "secondary-fixed": "#ffd9e2",
                        "inverse-primary": "#ffb4a4",
                        "secondary": "#78555e",
                        "on-tertiary-fixed": "#2a1800",
                        "surface-container-highest": "#fcdbd5",
                        "inverse-surface": "#3f2c28",
                        "surface-bright": "#fff8f6",
                        "error-container": "#ffdad6",
                        "primary": "#8c4d3f",
                        "surface-container-high": "#ffe2dc",
                        "inverse-on-surface": "#ffede9",
                        "primary-fixed-dim": "#ffb4a4",
                        "surface-container-low": "#fff0ee",
                        "on-tertiary-container": "#674000",
                        "surface-dim": "#f3d3cd",
                        "surface-container-lowest": "#ffffff",
                        "on-surface-variant": "#534340",
                        "error": "#ba1a1a",
                        "surface-variant": "#fcdbd5",
                        "tertiary-container": "#f3a93e",
                        "on-secondary-fixed-variant": "#5e3e47",
                        "tertiary-fixed-dim": "#ffb95a",
                        "on-surface": "#281714",
                        "surface-tint": "#8c4d3f",
                        "on-primary-fixed": "#380c04",
                        "on-secondary-container": "#7a5761",
                        "on-tertiary": "#ffffff",
                        "on-primary-fixed-variant": "#6f3629"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #1e222b;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: 'Quicksand', sans-serif;
            overflow: hidden;
        }

        .mobile-container {
            position: relative;
            height: 95vh;
            aspect-ratio: 9 / 16;
            overflow: hidden;
            background-image: url('background.png');
            background-size: 108% 108%;
            background-position: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.6);
            border-radius: 1.5rem;
            animation: animate-bg-float 8s ease-in-out infinite;
        }

        @media (max-width: 480px) {
            .mobile-container {
                width: 100vw;
                height: 100vh;
                aspect-ratio: auto;
                border-radius: 0;
            }
        }

        @keyframes animate-bg-float {
            0%, 100% { background-position: center; }
            50% { background-position: calc(50% + 4px) calc(50% + 3px); }
        }

        .animate-title-float {
            animation: title-float 5s ease-in-out infinite;
        }
        @keyframes title-float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-5px) rotate(0.4deg); }
        }

        .animate-machine-float {
            animation: machine-float 6s ease-in-out infinite;
        }
        @keyframes machine-float {
            0%, 100% { transform: translateX(0px) translateY(0px); }
            50% { transform: translateX(-3px) translateY(1px); }
        }

        .spin-animation {
            animation: spin-step 1.8s forwards;
        }

        @keyframes spin-step {
            0% { transform: translate(-50%, -50%) rotate(0deg); }
            25% { transform: translate(-50%, -50%) rotate(120deg); }
            35% { transform: translate(-50%, -50%) rotate(120deg); }
            60% { transform: translate(-50%, -50%) rotate(240deg); }
            70% { transform: translate(-50%, -50%) rotate(240deg); }
            100% { transform: translate(-50%, -50%) rotate(360deg); }
        }

        .drop-animation {
            animation: drop-bounce 0.8s cubic-bezier(0.28, 0.84, 0.42, 1) forwards;
            display: block !important;
        }

        @keyframes drop-bounce {
            0% { transform: translateX(-50%) translateY(-50px) scale(1, 1); opacity: 0; }
            40% { transform: translateX(-50%) translateY(0) scale(1, 1); opacity: 1; }
            50% { transform: translateX(-50%) translateY(0) scale(1.2, 0.8); }
            65% { transform: translateX(-50%) translateY(-15px) scale(0.9, 1.1); }
            80% { transform: translateX(-50%) translateY(0) scale(1.05, 0.95); }
            100% { transform: translateX(-50%) translateY(0) scale(1, 1); opacity: 1; }
        }
        
        .pulse-soft {
            animation: pulse-soft 2s infinite;
        }
        
        @keyframes pulse-soft {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
    </style>
</head>
<body class="text-on-surface">
    <div class="mobile-container flex flex-col items-center justify-between py-6">
        <div class="z-0 text-center px-4 w-full mt-4 -mb-4 animate-title-float">
            <img alt="Titolo" class="w-6/12 mx-auto object-contain drop-shadow-md" src="titolo.png">
        </div>

        <div class="relative w-full flex-1 flex items-center justify-center animate-machine-float">
            <img alt="Gacha Machine" class="w-11/12 h-full max-h-[63vh] object-contain z-10 pointer-events-none" src="Gacha_machine.png">
            
            <div class="absolute z-20 cursor-pointer" id="crank-container" style="top: 64%; left: 50%; transform: translate(-50%, -50%); width: 20%; aspect-ratio: 1/1;">
                <img alt="Crank" class="w-full h-full object-contain drop-shadow-lg transition-transform hover:scale-105 active:scale-95" id="crank" src="manopola.png">
                <div class="absolute -inset-2 bg-primary/20 rounded-full animate-ping -z-10" id="crank-hint" style="display: block;"></div>
            </div>

            <div class="absolute z-30 cursor-pointer hidden" id="capsule-container" style="bottom: 10%; left: 67%; transform: translateX(-50%); width: 18%; aspect-ratio: 1/1;">
                <img alt="Capsule" class="w-full h-full object-contain drop-shadow-xl pulse-soft" id="capsule" src="pallina.png">
                <div class="absolute -top-6 left-1/2 -translate-x-1/2 bg-surface text-primary text-xs font-bold px-2 py-1 rounded-full border border-outline whitespace-nowrap animate-bounce shadow-sm">
                    Apri!
                </div>
            </div>
        </div>

        <div class="z-20 w-full flex justify-center gap-3 px-4 mb-2" id="collection-container">
            </div>

        <div class="z-10 text-center pb-2 w-full text-on-background opacity-90 text-sm font-semibold tracking-wide drop-shadow-sm mt-2">
            Created by RABEBOP ⭐
        </div>

        <div class="absolute inset-0 z-50 bg-on-background/80 backdrop-blur-sm flex flex-col items-center justify-center p-6 transition-opacity duration-300 hidden opacity-0" id="overlay">
            <div class="bg-surface w-full max-w-sm rounded-3xl p-6 border-4 border-outline flex flex-col items-center relative transform transition-transform duration-300 scale-95" id="overlay-content">
                <h2 class="text-3xl font-extrabold text-primary text-center mb-6 border-b-2 border-outline-variant pb-4 w-full tracking-wide">HAI VINTO!</h2>
                
                <div class="relative w-44 h-44 mb-6 rounded-2xl overflow-hidden border-2 border-outline shadow-inner bg-surface-container-high flex items-center justify-center">
                    <img id="prize-img" alt="Prize" class="w-full h-full object-contain p-2" src="spritz.png">
                </div>
                
                <div class="text-md text-on-surface text-center mb-8 bg-secondary-container py-3 px-4 rounded-xl border border-secondary-fixed-dim w-full">
                    <span id="prize-title" class="font-bold text-primary block mb-2">Hai ottenuto un COCKTAIL RARO! 🍹</span>
                    <span class="text-sm block leading-relaxed">Aperitivo ore 18.00<br>Non mancare!<br>(e offrimi da bere!)</span>
                </div>
                <button class="bg-primary text-on-primary text-lg py-4 px-10 rounded-full border-b-4 border-on-primary-fixed active:border-b-0 active:translate-y-1 transition-all shadow-md w-full flex items-center justify-center gap-2" id="btn-reset">
                    <span class="material-symbols-outlined">refresh</span>
                    Riprova
                </button>
            </div>
        </div>

        <div class="absolute inset-0 z-[60] bg-on-background/90 backdrop-blur-md flex flex-col items-center justify-center p-6 transition-opacity duration-300 hidden opacity-0" id="final-overlay">
            <div class="bg-surface w-full max-w-sm rounded-3xl p-8 border-4 border-tertiary-container text-center shadow-2xl transform transition-transform duration-300 scale-95" id="final-overlay-content">
                <span class="material-symbols-outlined text-6xl text-tertiary-container mb-2 block animate-bounce">stars</span>
                <h2 class="text-3xl font-extrabold text-primary mb-4 border-b-2 border-outline-variant pb-4">COMPLIMENTI!</h2>
                <p class="text-lg text-on-surface font-bold leading-relaxed mb-6">
                    Li hai collezionati tutti.<br>Ora vieni al bar...
                </p>
                <div class="flex justify-center gap-2 flex-wrap mb-8" id="final-collection-showcase">
                </div>
                <button class="bg-tertiary-container text-on-tertiary-container text-lg py-4 px-10 rounded-full border-b-4 border-tertiary active:border-b-0 active:translate-y-1 transition-all shadow-md w-full font-bold flex items-center justify-center gap-2" onclick="location.reload()">
                    <span class="material-symbols-outlined">replay</span>
                    Ricomincia Gioco
                </button>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const crankContainer = document.getElementById('crank-container');
            const crankHint = document.getElementById('crank-hint');
            const capsuleContainer = document.getElementById('capsule-container');
            
            const overlay = document.getElementById('overlay');
            const overlayContent = document.getElementById('overlay-content');
            const btnReset = document.getElementById('btn-reset');
            const prizeImg = document.getElementById('prize-img');
            const prizeTitle = document.getElementById('prize-title');

            const collectionContainer = document.getElementById('collection-container');
            const finalOverlay = document.getElementById('final-overlay');
            const finalOverlayContent = document.getElementById('final-overlay-content');
            const finalCollectionShowcase = document.getElementById('final-collection-showcase');

            // Pool statico di riferimento per i 5 elementi della collezione
            const allPrizes = [
                { id: 'spritz', img: 'spritz.png', title: 'Hai ottenuto un COCKTAIL RARO! 🍹' },
                { id: 'cocktail', img: 'cocktail.png', title: 'Hai ottenuto un COCKTAIL SPECIALE! 🍸' },
                { id: 'vino', img: 'vino.png', title: 'Hai ottenuto un CALICE DI VINO! 🍷' },
                { id: 'negroni', img: 'negroni.png', title: 'Hai ottenuto un NEGRONI DECISO! 🥃' },
                { id: 'gin-tonic', img: 'gin-tonic.png', title: 'Hai ottenuto un GIN TONIC FRESCO! 🍋' }
            ];

            // Oggetto di stato per contare quanti doppioni sono stati trovati per ciascuno
            let collectionCounts = {
                'spritz': 0,
                'cocktail': 0,
                'vino': 0,
                'negroni': 0,
                'gin-tonic': 0
            };

            let isPlaying = false;

            // Verifica se l'album è completo (tutti i valori sono superiori a zero)
            function isCollectionComplete() {
                return Object.values(collectionCounts).every(count => count > 0);
            }

            // Funzione per aggiornare la UI della barra collezione con i numerini
            function renderCollection() {
                collectionContainer.innerHTML = '';
                
                allPrizes.forEach(prize => {
                    // Contenitore relativo obbligatorio per l'ancoraggio del numerino fluttuante
                    const slotWrapper = document.createElement('div');
                    slotWrapper.className = 'relative';

                    const slot = document.createElement('div');
                    slot.className = 'w-10 h-10 rounded-full border-2 flex items-center justify-center overflow-hidden drop-shadow-sm transition-all duration-300';
                    
                    const count = collectionCounts[prize.id];
                    
                    if (count > 0) {
                        // Slot Trovato
                        slot.classList.add('border-primary', 'bg-surface-bright');
                        const img = document.createElement('img');
                        img.src = prize.img;
                        img.className = 'w-3/4 h-3/4 object-contain';
                        slot.appendChild(img);

                        // Piccolo badge rotondo con il numero totale (doppioni compresi)
                        const badge = document.createElement('div');
                        badge.className = 'absolute -top-1.5 -right-1.5 bg-primary text-on-primary text-[10px] font-extrabold w-4 h-4 rounded-full flex items-center justify-center border border-surface shadow-sm scale-100 transition-transform duration-200';
                        badge.innerText = count;
                        slotWrapper.appendChild(badge);
                    } else {
                        // Slot Vuoto / Mancante
                        slot.classList.add('border-outline/40', 'bg-surface-container/50');
                        const qm = document.createElement('span');
                        qm.className = 'text-outline/40 font-bold text-sm';
                        qm.innerText = '?';
                        slot.appendChild(qm);
                    }
                    
                    slotWrapper.appendChild(slot);
                    collectionContainer.appendChild(slotWrapper);
                });
            }

            // Inizializza la collezione statica a schermo
            renderCollection();

            crankContainer.addEventListener('click', () => {
                if (isPlaying || isCollectionComplete()) return;
                isPlaying = true;
                
                crankHint.style.display = 'none';
                crankContainer.classList.add('spin-animation');

                setTimeout(() => {
                    crankContainer.classList.remove('spin-animation');
                    capsuleContainer.classList.remove('hidden');
                    capsuleContainer.classList.add('drop-animation');
                }, 1800);
            });

            capsuleContainer.addEventListener('click', () => {
                capsuleContainer.classList.remove('drop-animation');
                capsuleContainer.classList.add('hidden');
                
                // Pesca casualmente SEMPRE dall'intero elenco dei 5 cocktail (Casualità pura)
                const randomIndex = Math.floor(Math.random() * allPrizes.length);
                const randomPrize = allPrizes[randomIndex];
                
                // Aggiorna il dizionario incrementando il contatore
                collectionCounts[randomPrize.id]++;
                
                // Aggiorna la schermata popup premio
                prizeImg.src = randomPrize.img;
                prizeTitle.innerHTML = randomPrize.title;
                
                // Aggiorna istantaneamente la barra della collezione visiva
                renderCollection();
                
                // Mostra overlay premio
                overlay.classList.remove('hidden');
                void overlay.offsetWidth;
                overlay.classList.remove('opacity-0');
                overlay.classList.add('opacity-100');
                overlayContent.classList.remove('scale-95');
                overlayContent.classList.add('scale-100');
            });

            btnReset.addEventListener('click', () => {
                // Chiude overlay premio
                overlay.classList.remove('opacity-100');
                overlay.classList.add('opacity-0');
                overlayContent.classList.remove('scale-100');
                overlayContent.classList.add('scale-95');
                
                setTimeout(() => {
                    overlay.classList.add('hidden');
                    isPlaying = false;
                    
                    // Controlla se l'album è finalmente completo (tutti i 5 sbloccati almeno 1 volta)
                    if (isCollectionComplete()) {
                        finalCollectionShowcase.innerHTML = '';
                        allPrizes.forEach(prize => {
                            const imgBox = document.createElement('div');
                            imgBox.className = 'w-12 h-12 rounded-full border-2 border-primary bg-surface-bright flex items-center justify-center p-1';
                            const img = document.createElement('img');
                            img.src = prize.img;
                            img.className = 'w-full h-full object-contain';
                            imgBox.appendChild(img);
                            finalCollectionShowcase.appendChild(imgBox);
                        });

                        // Mostra popup vittoria finale
                        finalOverlay.classList.remove('hidden');
                        void finalOverlay.offsetWidth;
                        finalOverlay.classList.remove('opacity-0');
                        finalOverlay.classList.add('opacity-100');
                        finalOverlayContent.classList.remove('scale-95');
                        finalOverlayContent.classList.add('scale-100');
                    } else {
                        // Se mancano ancora cocktail, fa ricomparire l'hint per girare la manopola
                        crankHint.style.display = 'block';
                    }
                }, 300);
            });
        });
    </script>
</body>
</html>
